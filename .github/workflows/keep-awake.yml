# Pings the Railway backend every 10 minutes during US market hours (Mon-Fri).
# Cron is UTC: 13:00-20:50 UTC covers 9:30-16:00 ET in both DST states.
# Set RAILWAY_BACKEND_URL as a repo secret (Settings → Secrets → Actions).
name: Keep backend awake (market hours)

on:
  schedule:
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch:

env:
  BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [[ "$BACKEND_URL" == *"RENDER-URL-GOES-HERE"* ]]; then
            echo "Backend URL not configured yet — skipping."
            exit 0
          fi
          # --max-time 90: allow for cold start if the service did doze off
          curl -fsS --max-time 90 "$BACKEND_URL/api/health" && echo "" && echo "awake ✓" \
            || echo "ping failed — service may still be waking up"
